# Optional: save as `docker-compose.override.yml` (gitignored) to attach *existing* Docker volumes
# instead of the default named volumes from docker-compose.yml.
#
# 1. docker volume create my-mogause-backend-data
# 2. Copy this file to docker-compose.override.yml
# 3. Uncomment and set `name:` to your volume names
# 4. docker compose --env-file docker.env up -d
#
# Compose merges overrides; `external: true` replaces the inline volume definition
# for the same volume *key* only if you match the key name (e.g. mogause_backend_data).

# version: "3.9"  # optional; Compose v2 ignores

# volumes:
#   mogause_backend_data:
#     external: true
#     name: my-mogause-backend-data
#   mogause_frontend_data:
#     external: true
#     name: my-mogause-frontend-data