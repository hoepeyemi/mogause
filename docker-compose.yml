# mogause — Docker Compose (all env from repo root: docker.env)
#
# 1. cp docker.env.example docker.env
# 2. Edit docker.env (keys, secrets, NEXT_PUBLIC_API_URL for your host / domain)
# 3. docker compose --env-file docker.env up -d --build
#    or: npm run docker:up
#
# Storage (see docker.env.example “Storage” section):
#   Persistent named volumes — survive container recreate
#   tmpfs — ephemeral cache/scratch (lost when container is removed)
#
# To attach existing volumes, copy docker-compose.override.example.yml →
# docker-compose.override.yml and set external: true + volume name.

name: mogause

volumes:
  mogause_backend_data:
  mogause_frontend_data:

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PUBLISH_PORT:-4002}:4002"
    env_file:
      - ./docker.env
    volumes:
      - mogause_backend_data:/data
      - type: tmpfs
        target: /tmp/mogause
        tmpfs:
          size: 268435456

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4002}
        NEXT_PUBLIC_SERVER_ADDRESS: ${NEXT_PUBLIC_SERVER_ADDRESS:-}
        NEXT_PUBLIC_AGENT_PRIVATE_KEY: ${NEXT_PUBLIC_AGENT_PRIVATE_KEY:-}
        NEXT_PUBLIC_STELLAR_NETWORK: ${NEXT_PUBLIC_STELLAR_NETWORK:-stellar:testnet}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:3000"
    env_file:
      - ./docker.env
    volumes:
      - mogause_frontend_data:/opt/run/data
      - type: tmpfs
        target: /opt/run/.next/cache
        tmpfs:
          size: 536870912
      - type: tmpfs
        target: /tmp/mogause
        tmpfs:
          size: 268435456
    depends_on:
      - backend

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - ./docker.env
    volumes:
      - type: tmpfs
        target: /tmp/mogause
        tmpfs:
          size: 134217728
    depends_on:
      - backend
